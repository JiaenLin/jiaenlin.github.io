name: Daily Paper Digest

on:
  schedule:
    - cron: '30 16 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run paper watcher
        env:
          GIST_ID:  ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          NCBI_KEY: ${{ secrets.NCBI_KEY }}
        run: python scripts/paper_watch.py
      - name: Refresh Cloudflare Worker cache
        run: |
          curl -s "https://jiaen-digital-twin.jiaenlin999.workers.dev/refresh"
      - name: Confirm output
        run: echo "Paper digest complete for $(date '+%Y-%m-%d')"
