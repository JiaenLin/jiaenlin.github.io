<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat with Jiaen Lin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{--bg:#f7f6f2;--surface:#fff;--surface2:#f3f0ec;--border:#dcd9d5;--text:#28251d;--muted:#6b6964;--faint:#b0ada8;--primary:#01696f;--primary-h:#0c4e54;--primary-l:#e4f0f0;--user-bg:#01696f;--user-text:#fff;--font:'Inter',system-ui,sans-serif;--display:'Instrument Serif',Georgia,serif}
[data-theme="dark"]{--bg:#131210;--surface:#1f1e1c;--surface2:#2a2926;--border:#2e2c2a;--text:#cfcdc9;--muted:#7a7875;--faint:#4a4846;--primary:#4f98a3;--primary-h:#70b5be;--primary-l:#1e2e2f;--user-bg:#1f5459;--user-text:#e0f0f1}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);font-size:16px;color:var(--text);background:var(--bg);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.identity{display:flex;align-items:center;gap:10px}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-h));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-style:italic;font-size:1.1rem;color:#fff;flex-shrink:0}
.id-text h1{font-family:var(--display);font-size:1.1rem;font-weight:400;font-style:italic;line-height:1.2}
.id-text p{font-size:0.78rem;color:var(--muted)}
.dot{display:inline-block;width:7px;height:7px;background:#22c55e;border-radius:50%;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hbtn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.hbtn:hover{background:var(--surface2);color:var(--text)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.row{display:flex;gap:8px;animation:in 220ms cubic-bezier(.16,1,.3,1) both}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row.user{flex-direction:row-reverse}
.mavatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:600;flex-shrink:0;margin-top:2px}
.row.assistant .mavatar{background:linear-gradient(135deg,var(--primary),var(--primary-h));color:#fff;font-family:var(--display);font-style:italic}
.row.user .mavatar{background:var(--surface2);color:var(--muted)}
.bubble{max-width:82%;padding:10px 14px;border-radius:14px;font-size:0.9rem;line-height:1.65;word-break:break-word}
.row.assistant .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.row.user .bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:4px}
.bubble pre{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;overflow-x:auto;font-size:.8rem;margin:6px 0}
.bubble code{font-family:monospace}
.bubble :not(pre)>code{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:.85em}

/* Typing */
.typing{display:none}
.typing.on{display:flex}
.tdots{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px}
.tdots span{width:6px;height:6px;background:var(--primary);border-radius:50%;opacity:.4;animation:bounce 1.4s ease-in-out infinite}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{opacity:.4;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

/* Suggestions */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface)}
.chip{padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all 150ms;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l)}

/* Input */
.inputbar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
textarea{flex:1;min-height:40px;max-height:120px;resize:none;border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-family:var(--font);font-size:.9rem;color:var(--text);background:var(--bg);outline:none;line-height:1.5;transition:border-color 150ms}
textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--primary) 15%,transparent)}
textarea::placeholder{color:var(--faint)}
.sendbtn{width:40px;height:40px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 150ms,transform 150ms;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.sendbtn:hover{background:var(--primary-h)}
.sendbtn:active{transform:scale(.93)}
.sendbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

@media(max-width:480px){.bubble{max-width:90%}.chips{flex-wrap:nowrap;overflow-x:auto}.chips::-webkit-scrollbar{display:none}}
.micbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 150ms;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.micbtn:hover{border-color:var(--primary);color:var(--primary)}
.micbtn.listening{background:var(--primary);color:#fff;border-color:var(--primary);animation:mic-pulse 1s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in oklch,var(--primary) 40%,transparent)}50%{box-shadow:0 0 0 8px color-mix(in oklch,var(--primary) 0%,transparent)}}
</style>
</head>
<body>

<header class="header">
  <div class="identity">
    <a id="backBtn" href="https://jiaenlin.github.io/" title="Back to main site"
       style="display:none;width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;text-decoration:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="avatar">J</div>
    <div class="id-text">
      <h1>Jiaen Lin</h1>
      <p><span class="dot"></span><span id="header-subtitle">Digital Twin · Computational Biologist</span></p>
    </div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="hbtn" id="themeBtn" title="Toggle dark mode" type="button">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="hbtn" id="muteBtn" title="Toggle voice output" type="button">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
    <button class="hbtn" id="clearBtn" title="Clear chat" type="button">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.36"/></svg>
    </button>
  </div>
</header>

<div class="messages" id="msgs" role="log" aria-live="polite">
  <div class="row assistant">
    <div class="mavatar">J</div>
    <div class="bubble" id="welcome-bubble">Hi! I'm Jiaen Lin's AI digital twin Jayce🧬 Ask me about my research in single-cell RNA-seq, multi-omics, or anything about my work and collaborations!</div>
  </div>
</div>

<div class="row assistant typing" id="typing">
  <div class="mavatar">J</div>
  <div class="tdots"><span></span><span></span><span></span></div>
</div>

<div class="chips" id="chips"></div>

<form class="inputbar" id="form" onsubmit="return false">
  <textarea id="input" rows="1" aria-label="Message"></textarea>
  <button class="micbtn" id="micBtn" type="button" aria-label="Voice input">
    <svg id="mic-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
  </button>
  <button class="sendbtn" id="sendBtn" type="button" disabled aria-label="Send">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</form>

<script>
// ── Language Setup ───────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const siteLang = urlParams.get('lang') || 'en';
const isZh = siteLang.startsWith('zh');
document.documentElement.lang = isZh ? 'zh-Hans' : 'en';

// Show back button when opened as a standalone page on mobile (not in iframe)
if (window.self === window.top && ('ontouchstart' in window) && window.innerWidth < 768) {
  document.getElementById('backBtn').style.display = 'flex';
}

const I18N = {
  en: {
    subtitle:    'Digital Twin · Computational Biologist',
    welcome:     'Hi! I\'m Jiaen Lin\'s AI digital twin Jayce\uD83E\uDDEC Ask me about my research in single-cell RNA-seq, multi-omics, or anything about my work and collaborations!',
    placeholder: 'Ask Jayce anything…',
    listening:   'Listening…',
    micTitle:    'Speak your question',
    micStop:     'Listening… click to stop',
    micError:    'Mic error — try again',
    connError:   'Connection error — please try again.',
    userAvatar:  'You',
    chips: [
      { label: 'Current research', prompt: 'What is your current research focus?' },
      { label: 'Tech stack',       prompt: 'What programming tools do you use?' },
      { label: 'Collaborations',   prompt: 'Are you open to collaborations?' },
      { label: 'Multi-omics',      prompt: 'How do you integrate multi-omics data?' },
    ],
  },
  zh: {
    subtitle:    'AI分身 · 计算生物学家',
    welcome:     '你好！我是林佳恩的AI数字分身Jayce🧬 你可以问我关于单细胞RNA测序、多组学研究，或任何关于我的工作与合作的问题！',
    placeholder: '问Jayce任何问题…',
    listening:   '正在聆听…',
    micTitle:    '语音提问',
    micStop:     '正在聆听… 点击停止',
    micError:    '麦克风错误，请重试',
    connError:   '连接失败，请重试。',
    userAvatar:  '你',
    chips: [
      { label: '当前研究方向', prompt: '你目前的研究重点是什么？' },
      { label: '技术',        prompt: '你使用哪些编程工具？' },
      { label: '合作机会',    prompt: '你是否开放科研合作？' },
      { label: '多组学整合',  prompt: '你如何整合多组学数据？' },
    ],
  },
};

const T = isZh ? I18N.zh : I18N.en;

document.getElementById('header-subtitle').textContent = T.subtitle;
document.getElementById('welcome-bubble').textContent  = T.welcome;
document.getElementById('input').placeholder           = T.placeholder;
document.getElementById('micBtn').title                = T.micTitle;

const chipsEl = document.getElementById('chips');
T.chips.forEach(({ label, prompt }) => {
  const btn = document.createElement('button');
  btn.className   = 'chip';
  btn.type        = 'button';
  btn.dataset.p   = prompt;
  btn.textContent = label;
  chipsEl.appendChild(btn);
});

// ── Core Setup ───────────────────────────────────────────────────
const WORKER = "https://jiaen-digital-twin.jiaenlin999.workers.dev/chat";
let history = [], streaming = false;

// Pre-cache voices so speak() never needs a setTimeout retry (iOS blocks
// speechSynthesis.speak() called from a timeout — it must run synchronously
// inside, or after unlocking within, a user gesture).
let cachedVoices = [];
function loadVoices() {
  const v = window.speechSynthesis.getVoices();
  if (v.length) cachedVoices = v;
}
loadVoices();
if ('onvoiceschanged' in window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

const msgs    = document.getElementById("msgs");
const input   = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const typing  = document.getElementById("typing");

function getVisitorId() {
  let id = localStorage.getItem("jl_visitor_id");
  if (!id) { id = crypto.randomUUID(); localStorage.setItem("jl_visitor_id", id); }
  return id;
}

// ── Theme — default light ────────────────────────────────────────
let dark = false;
setTheme(dark);
document.getElementById("themeBtn").addEventListener("pointerdown", e => {
  e.preventDefault();
  dark = !dark;
  setTheme(dark);
});

function setTheme(d) {
  document.documentElement.setAttribute("data-theme", d ? "dark" : "light");
  document.getElementById("themeBtn").innerHTML = d
    ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
    : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

// ── Voice output toggle ──────────────────────────────────────────
let voiceEnabled = false;
let speechUnlocked = false;

// iOS/Android require speechSynthesis.speak() to be called synchronously
// inside a user-gesture handler. We fire a silent utterance on first send
// to unlock the audio context, so the real speak() call after await works.
function unlockSpeech() {
  if (speechUnlocked || !window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  window.speechSynthesis.speak(u);
  speechUnlocked = true;
}
document.getElementById("muteBtn").addEventListener("pointerdown", e => {
  e.preventDefault();
  voiceEnabled = !voiceEnabled;
  window.speechSynthesis.cancel();
  document.getElementById("muteBtn").innerHTML = voiceEnabled
    ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
       </svg>`
    : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
       </svg>`;
});

// ── Clear chat ───────────────────────────────────────────────────
document.getElementById("clearBtn").addEventListener("pointerdown", e => {
  e.preventDefault();
  history = [];
  window.speechSynthesis.cancel();
  [...msgs.querySelectorAll(".row")].slice(1).forEach(r => r.remove());
  chipsEl.style.display = "flex";
  if (!document.getElementById('paper-chip')) chipsEl.prepend(buildPaperButton());
});

// ── Textarea auto-resize + enable send button ────────────────────
function updateInput() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
  sendBtn.disabled = !input.value.trim() || streaming;
}
["input", "keyup", "compositionend", "compositionupdate", "change"].forEach(evt =>
  input.addEventListener(evt, updateInput)
);

// Quark mobile's IME keyboard often doesn't fire input/keyup events.
// Poll the value while the textarea is focused as a fallback.
let _inputPoll = null;
input.addEventListener("focus", () => {
  _inputPoll = setInterval(updateInput, 100);
});
input.addEventListener("blur", () => {
  clearInterval(_inputPoll);
  _inputPoll = null;
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
});

// ── Send button — touchend + pointerdown for Quark mobile ────────
let _sendTouchHandled = false;
sendBtn.addEventListener("touchend", e => {
  e.preventDefault();
  _sendTouchHandled = true;
  if (!sendBtn.disabled) send();
  setTimeout(() => { _sendTouchHandled = false; }, 600);
}, { passive: false });
sendBtn.addEventListener("pointerdown", e => {
  if (_sendTouchHandled) return;
  e.preventDefault();
  if (!sendBtn.disabled) send();
});

// ── Chips — pointerdown delegate ────────────────────────────────
chipsEl.addEventListener("pointerdown", e => {
  const c = e.target.closest(".chip");
  if (!c || streaming) return;
  if (c.id === 'paper-chip') return;
  e.preventDefault();
  input.value = c.dataset.p;
  updateInput();
  send();
});

// ── Send ─────────────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || streaming) return;
  unlockSpeech();
  chipsEl.style.display = "none";
  addMsg("user", text);
  history.push({ role: "user", content: text });
  input.value = ""; input.style.height = "auto"; sendBtn.disabled = true; streaming = true;
  typing.classList.add("on"); scroll();

  const row    = makeRow("assistant");
  const bubble = row.querySelector(".bubble");

  try {
    const res = await fetch(WORKER, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, visitorId: getVisitorId() })
    });
    if (!res.ok) throw new Error("HTTP " + res.status);

    typing.classList.remove("on");
    msgs.appendChild(row); scroll();

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = "", full = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const d = line.slice(6).trim();
        if (d === "[DONE]") continue;
        try {
          const t = JSON.parse(d).response || JSON.parse(d).choices?.[0]?.delta?.content || "";
          if (t) { full += t; bubble.innerHTML = md(full); scroll(); }
        } catch {}
      }
    }
    history.push({ role: "assistant", content: full });
    speak(full);
  } catch (err) {
    typing.classList.remove("on");
    bubble.innerHTML = `<span style="color:var(--muted)">${T.connError}</span>`;
    if (!row.parentNode) msgs.appendChild(row);
  } finally {
    streaming = false;
    sendBtn.disabled = !input.value.trim();
    scroll();
  }
}

function addMsg(role, text) {
  const row = makeRow(role);
  row.querySelector(".bubble").textContent = text;
  msgs.appendChild(row); scroll();
}

function makeRow(role) {
  const row = document.createElement("div");
  row.className = "row " + role;
  const av = document.createElement("div");
  av.className   = "mavatar";
  av.textContent = role === "assistant" ? "J" : T.userAvatar;
  const b = document.createElement("div");
  b.className = "bubble";
  row.appendChild(av); row.appendChild(b);
  return row;
}

function scroll() { msgs.scrollTo({ top: msgs.scrollHeight, behavior: "smooth" }); }

// ── Text-to-speech ───────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis || !voiceEnabled) return;
  window.speechSynthesis.cancel();
  // iOS Safari silently pauses synthesis; resume() before speaking fixes it.
  window.speechSynthesis.resume();

  const plain = text
    .replace(/```[\s\S]*?```/g, 'code block')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/#+\s/g, '')
    .replace(/<[^>]+>/g, '')
    .trim();
  const utter = new SpeechSynthesisUtterance(plain.slice(0, 500));
  utter.lang  = isZh ? 'zh-CN' : 'en-US';
  utter.rate  = 1.4;
  utter.pitch = 1;

  // Use pre-cached voices — no setTimeout retry, which would run outside the
  // gesture context and be silently blocked by iOS.
  const voices = cachedVoices.length ? cachedVoices : window.speechSynthesis.getVoices();
  const zhMalePriority = ['zhiwei','yunjian','yunyang','yunxi','kangkang'];
  const enMalePriority = ['male','alex','daniel','mark','david'];
  const priority   = isZh ? zhMalePriority : enMalePriority;
  const langVoices = voices.filter(v => v.lang.startsWith(isZh ? 'zh' : 'en'));
  let maleVoice = null, bestRank = -1;
  for (const v of langVoices) {
    const name = v.name.toLowerCase();
    const rank = priority.findIndex(k => name.includes(k));
    if (rank > bestRank) { bestRank = rank; maleVoice = v; }
    if (bestRank === -1 && (name.includes('male') || v.name.includes('男'))) maleVoice = v;
  }
  if (maleVoice && isZh && !maleVoice.lang.startsWith('zh-CN')) {
    const cnMatch = langVoices.find(v => v.lang === 'zh-CN' && priority.some(k => v.name.toLowerCase().includes(k)));
    if (cnMatch) maleVoice = cnMatch;
  }
  if (!maleVoice && isZh) {
    const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
    if (zhVoices.length > 1) maleVoice = zhVoices[1];
  }
  if (maleVoice) utter.voice = maleVoice;
  window.speechSynthesis.speak(utter);
}

// ── Markdown renderer ────────────────────────────────────────────
function md(t) {
  return t
    .replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre><code>${esc(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g,       (_, c) => `<code>${esc(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g,   "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,       "<em>$1</em>")
    .replace(/^### (.+)$/gm,     "<strong>$1</strong>")
    .replace(/^## (.+)$/gm,      "<strong>$1</strong>")
    .replace(/^\s*[-*] (.+)$/gm, "<li>$1</li>")
    .replace(/(<li>.*<\/li>)/gs, "<ul style='padding-left:1.2em;margin:4px 0'>$1</ul>")
    .replace(/\n\n+/g,           "<br><br>")
    .replace(/\n/g,              "<br>");
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── Voice input ──────────────────────────────────────────────────
const micBtn = document.getElementById("micBtn");
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  micBtn.style.display = "none";
} else {
  const recognition        = new SpeechRecognition();
  recognition.continuous    = false;
  recognition.interimResults = true;
  recognition.lang          = isZh ? "zh-CN" : "en-US";
  let isListening = false;

  micBtn.addEventListener("pointerdown", e => {
    e.preventDefault();
    if (isListening) recognition.stop();
    else recognition.start();
  });

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add("listening");
    micBtn.title      = T.micStop;
    input.placeholder = T.listening;
  };

  recognition.onresult = (e) => {
    input.value = Array.from(e.results).map(r => r[0].transcript).join("");
    input.dispatchEvent(new Event("input"));
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove("listening");
    micBtn.title      = T.micTitle;
    input.placeholder = T.placeholder;
    if (input.value.trim()) send();
  };

  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove("listening");
    if (e.error !== "no-speech") {
      input.placeholder = T.micError;
      setTimeout(() => input.placeholder = T.placeholder, 2000);
    }
  };
}

// ══════════════════════════════════════════════
// TODAY'S PAPERS BUTTON
// ══════════════════════════════════════════════
const WORKER_BASE = 'https://jiaen-digital-twin.jiaenlin999.workers.dev';

function buildPaperButton() {
  const btn = document.createElement('button');
  btn.className   = 'chip';
  btn.id          = 'paper-chip';
  btn.type        = 'button';
  btn.textContent = isZh ? '📄 今日论文' : '📄 Today\'s Papers';
  btn.style.cssText = [
    'border-color:var(--primary)',
    'color:var(--primary)',
    'font-weight:600',
    'flex-shrink:0',
  ].join(';');

  async function handlePaperClick() {
    if (streaming) return;
    chipsEl.style.display = 'none';
    const loadRow = makeRow('assistant');
    loadRow.querySelector('.bubble').textContent =
      isZh ? '⏳ 正在加载今日论文…' : '⏳ Loading today\'s papers…';
    msgs.appendChild(loadRow);
    scroll();

    try {
      const data = await fetch(`${WORKER_BASE}/papers`).then(r => r.json());

      if (!data.ready) {
        loadRow.querySelector('.bubble').innerHTML =
          `<span style="color:var(--muted)">${data.message}</span>`;
        return;
      }

      const byJournal = {};
      data.papers.forEach(p => {
        if (!byJournal[p.journal]) byJournal[p.journal] = [];
        byJournal[p.journal].push(p);
      });

      const header = isZh
        ? `📚 <b>今日论文 — ${data.date}</b>（共 ${data.count} 篇）<br><br>`
        : `📚 <b>Today's Papers — ${data.date}</b> &nbsp;(${data.count} papers)<br><br>`;

      const body = Object.entries(byJournal).map(([journal, papers]) => {
        const items = papers.map(p => `
          <div style="margin-bottom:10px">
            <a href="${p.url}" target="_blank" rel="noopener"
               style="font-weight:600;color:var(--text);font-size:.87rem;line-height:1.4;display:block">
              ${p.title}
            </a>
            <div style="font-size:.74rem;color:var(--muted);margin:2px 0">${p.authors}</div>
            <div style="font-size:.82rem;color:var(--text);font-style:italic">💡 ${p.summary}</div>
          </div>
        `).join('');
        return `
          <div style="margin-bottom:14px">
            <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;
                        letter-spacing:.07em;color:var(--primary);margin-bottom:6px;
                        padding-bottom:4px;border-bottom:1px solid var(--border)">
              ${journal}
            </div>
            ${items}
          </div>
        `;
      }).join('');

      loadRow.querySelector('.bubble').innerHTML = header + body;
      scroll();

    } catch (err) {
      loadRow.querySelector('.bubble').innerHTML =
        `<span style="color:var(--muted)">
          ${isZh ? '无法加载论文，请稍后重试。' : 'Could not load papers — try again later.'}
        </span>`;
    }
  }

  // ✅ pointerdown for Quark mobile
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    handlePaperClick();
  });

  return btn;
}

chipsEl.prepend(buildPaperButton());
</script>
